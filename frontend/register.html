<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - Cloud Drive</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body{
            background:#f5f7fb;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:430px;
            border:none;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
        }

        .logo{
            font-size:52px;
            color:#0d6efd;
        }
    </style>

</head>

<body>

<div class="card p-4">

    <div class="text-center mb-4">

        <i class="bi bi-cloud-arrow-up-fill logo"></i>

        <h3 class="mt-3">
            Cloud Drive
        </h3>

        <p class="text-muted">
            Buat akun baru
        </p>

    </div>

    <form id="registerForm">

        <div class="mb-3">

            <label>Nama</label>

            <input
                id="name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Email</label>

            <input
                id="email"
                type="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                id="password"
                type="password"
                class="form-control"
                required>

        </div>

        <button
            class="btn btn-success w-100">

            Register

        </button>

    </form>

    <div
        id="errorMessage"
        class="alert alert-danger mt-3 d-none">
    </div>

    <p class="text-center mt-3">

        Sudah punya akun?

        <a href="login.html">

            Login

        </a>

    </p>

</div>

<script src="assets/js/register.js"></script>

</body>

</html>
